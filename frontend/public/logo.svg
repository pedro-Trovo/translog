<svg width="300" height="100" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Logo Translog</title>
  <desc id="logoDesc">Logotipo da empresa de logística Translog com um ícone de rota global e texto em branco.</desc>

  <!-- Definição de Gradiente para dar profundidade e modernidade -->
  <defs>
    <linearGradient id="mainGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A" /> <!-- Azul Escuro Profundo -->
      <stop offset="100%" stop-color="#334155" /> <!-- Azul Ardósia -->
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" /> <!-- Ciano Vibrante -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Azul Real -->
    </linearGradient>
  </defs>

  <!-- Grupo do Ícone (Esquerda) -->
  <g id="icon">
    <!-- Círculo de fundo sutil representando o globo/rota -->
    <path d="M45 15C62.6731 15 77 29.3269 77 47C77 64.6731 62.6731 79 45 79C27.3269 79 13 64.6731 13 47C13 29.3269 27.3269 15 45 15Z" 
          fill="url(#mainGradient)" opacity="0.1"/>
          
    <!-- Seta Principal (Movimento para frente) -->
    <path d="M38 28L60 47L38 66" 
          stroke="url(#mainGradient)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- Seta Secundária (Detalhe de velocidade/conexão) -->
    <path d="M50 36L60 47L50 58" 
          stroke="url(#accentGradient)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.9"/>
          
    <!-- Ponto de Destino -->
    <circle cx="70" cy="47" r="4" fill="url(#accentGradient)" />
  </g>

  <!-- Grupo do Texto (Direita) -->
  <g id="text" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Texto Principal -->
    <text x="95" y="58" 
          font-size="36" 
          font-weight="800" 
          letter-spacing="-1" 
          fill="#FFFFFF">
      TRANSLOG
    </text>
    
    <!-- Tagline / Slogan -->
    <text x="97" y="76" 
          font-size="12" 
          font-weight="600" 
          letter-spacing="3" 
          fill="#FFFFFF"
          opacity="0.75"
          text-transform="uppercase">
      Global Solutions
    </text>
  </g>
</svg>
